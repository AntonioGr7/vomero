<!doctype html>
<!--
  Minimal browser client for `vomero serve`.

  Run the server:   vomero serve --data examples/sample_corpus --port 8000
  Then open this file in a browser (or serve it) and ask a question.

  Flow:
    1. POST /runs {question}            -> { session_id, events, reply }
    2. EventSource(events)              -> stream of typed SSE events
    3. on an `ask_user` event           -> POST {reply} with the human's answer
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vomero — browser client</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; height: 60vh; overflow: auto; background: #fafafa; }
    .ev { margin: .3rem 0; white-space: pre-wrap; }
    .code { color: #036; } .output { color: #333; } .usage { color: #999; }
    .final { color: #060; font-weight: 600; } .ask { color: #b30; font-weight: 600; }
    .interaction { color: #608; } .compaction { color: #a60; } .error { color: #c00; }
    input[type=text] { width: 70%; padding: .5rem; } button { padding: .5rem 1rem; }
  </style>
</head>
<body>
  <h1>Vomero</h1>
  <p><input id="q" type="text" placeholder="Ask about the corpus…" size="60" />
     <button id="go">Ask</button>
     <label><input id="plan" type="checkbox" /> show plan</label></p>
  <div id="log"></div>

  <script>
    const BASE = "http://127.0.0.1:8000";   // where `vomero serve` is listening
    const log = document.getElementById("log");

    function line(type, text) {
      const div = document.createElement("div");
      div.className = "ev " + type;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function ask(question) {
      log.innerHTML = "";
      // 1. Start a run.
      const res = await fetch(`${BASE}/runs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, plan: document.getElementById("plan").checked }),
      });
      const { session_id, events, reply } = await res.json();
      line("usage", `session ${session_id}`);

      // 2. Stream events. EventSource dispatches by the SSE `event:` name.
      const es = new EventSource(`${BASE}${events}`);
      const show = (t) => (e) => line(t, render(t, JSON.parse(e.data)));
      ["usage", "code", "output", "message", "llm_call", "todo",
       "interaction", "compaction", "final", "error"].forEach(t =>
        es.addEventListener(t, show(t)));

      // 3. The agent needs the human — prompt and POST the answer back.
      es.addEventListener("ask_user", async (e) => {
        const { question } = JSON.parse(e.data);
        line("ask", `❓ ${question}`);
        const answer = window.prompt(question) ?? "";
        await fetch(`${BASE}${reply}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ answer }),
        });
        line("interaction", `↳ you: ${answer}`);
      });

      es.addEventListener("done", (e) => {
        const u = JSON.parse(e.data).usage;
        line("usage", `done · ${u.calls} calls · ${u.total_tokens} tokens`);
      });
      es.addEventListener("end", () => es.close());
    }

    function render(type, d) {
      switch (type) {
        case "usage": return `ctx ${d.usage.context_tokens} tok | total ${d.usage.cumulative_tokens} tok`;
        case "code": return `» ${d.code}`;
        case "output": return `← ${d.output}`;
        case "message": return `💬 ${d.message}`;
        case "llm_call": return `llm() +${d.llm_call.tokens} tok: ${d.llm_call.response.slice(0, 120)}`;
        case "todo": return "plan:\n" + d.todo.map(i =>
          `  ${({completed:"✔",in_progress:"▶"}[i.status]) || "☐"} ${i.text}`).join("\n");
        case "interaction": return `${d.interaction.kind === "parent" ? "↑ parent" : "❓ user"}: ${d.interaction.question} → ${d.interaction.answer}`;
        case "compaction": return `⟳ compacted ${d.compaction.summarized_messages} msgs`;
        case "final": return `✓ ${d.final}`;
        case "error": return `error: ${d.error}`;
        default: return JSON.stringify(d);
      }
    }

    document.getElementById("go").onclick = () => ask(document.getElementById("q").value);
    document.getElementById("q").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("go").click();
    });
  </script>
</body>
</html>
