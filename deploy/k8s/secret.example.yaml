# Your LLM credentials. Copy to secret.yaml, fill in, and DO NOT commit it.
# Prefer creating it from the CLI so the key never lands in a file:
#
#   kubectl create secret generic vomero-llm \
#     --from-literal=OPENAI_API_KEY=sk-...
#
apiVersion: v1
kind: Secret
metadata:
  name: vomero-llm
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  # For Gemini instead, use:  GEMINI_API_KEY: "REPLACE_ME"
