# Makes the external Vomero VM reachable in-cluster as `http://vomero` (port 80
# -> the VM's 8000). Your frontend pods call that name; Kubernetes routes to the
# VM. This is the "frontend calls external Vomero" wiring for Strategy A.
#
# Set the VM's PRIVATE IP below, then: kubectl apply -f vomero-endpoint.yaml
apiVersion: v1
kind: Service
metadata:
  name: vomero
spec:
  ports:
    - port: 80
      targetPort: 8000
  # no selector: the endpoints are managed manually (the Endpoints below)
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vomero            # MUST match the Service name above
subsets:
  - addresses:
      - ip: "10.0.0.5"    # <-- the VM's private IP (reachable from the cluster)
    ports:
      - port: 8000
# --- Alternative: if the VM has a DNS name instead of a fixed IP, delete the
#     Service+Endpoints above and use an ExternalName Service (note: it does NOT
#     remap ports, so clients call the VM's real port, e.g. http://vomero:8000):
#
#   apiVersion: v1
#   kind: Service
#   metadata: { name: vomero }
#   spec:
#     type: ExternalName
#     externalName: vomero.internal.example.com
